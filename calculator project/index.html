<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <a href="../index.html">Return to Homepage</a>
    <div id="content">
        <div id="header">Calculator</div>
        <div id="calculator">

            <div id="display">
                <div id="input"></div>
                <div id="result"></div>
            </div>

            <div id="buttons">
                <div class="row">
                    <button class="controls">~</button>
                    <button class="controls edge">C</button>
                    <button>7</button>
                    <button>4</button>
                    <button>1</button>
                    <button>0</button>
                </div>
                <div class="row">
                    <button class="controls">~</button>
                    <button class="controls">ANS</button>
                    <button>8</button>
                    <button>5</button>
                    <button>2</button>
                    <button>.</button>
                </div>
                <div class="row">
                    <button class="controls">~</button>
                    <button class="controls">( )</button>
                    <button>9</button>
                    <button>6</button>
                    <button>3</button>
                    <button>Back</button>
                </div>
                <div class="row">
                    <button class="controls">+</button>
                    <button class="controls">-</button>
                    <button class="controls">/</button>
                    <button class="controls">*</button>
                    <button class="controls">**</button>
                    <button class="controls edge">=</button>
                </div>
            </div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>

</html>
